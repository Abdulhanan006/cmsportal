<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | About CMS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-shell light-mode">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Admin Login</h1>
      <p>Sign in to manage your About page content.</p>
    </div>
    <form id="loginForm" class="auth-form">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@example.com" required />
      <label>Password</label>
      <input type="password" id="password" placeholder="********" required />
      <button type="submit" class="primary-btn">Sign In</button>
      <div id="authMessage" class="form-message"></div>
    </form>
    <div class="auth-footer">
      <p>Need help? Contact your site administrator.</p>
    </div>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
